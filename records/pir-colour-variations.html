<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIR Product Page — 10 Colour Variations</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#111;font-family:'Space Mono',monospace;-webkit-font-smoothing:antialiased}

/* Nav */
.var-nav{position:fixed;top:0;left:0;right:0;z-index:10000;background:#0a0a0a;border-bottom:1px solid #333;display:flex;align-items:center;padding:0 12px;gap:0;overflow-x:auto}
.var-nav button{padding:14px 16px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#666;background:none;border:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.var-nav button:hover{color:#aaa}
.var-nav button.active{color:#f4f2ee;border-bottom-color:#f4f2ee}
.var-label{font-family:'Bricolage Grotesque',sans-serif;font-size:11px;color:#444;padding:0 12px 0 4px;border-right:1px solid #333;margin-right:4px;white-space:nowrap}
.variation{display:none}
.variation.active{display:block}

/* ─── Each variation is a full page ─── */
.pir-page{min-height:100vh;padding-top:54px}
.page{max-width:1060px;margin:0 auto;padding:68px 52px 80px}
@media(max-width:640px){.page{padding:32px 16px 60px}}

/* Shared structure */
.signal{font-size:12px;letter-spacing:.25em;text-transform:uppercase;margin-bottom:16px}
.signal::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:8px}
h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(36px,6.5vw,64px);font-weight:700;line-height:1.05;letter-spacing:-.02em}
.brand-tag{font-size:15px;margin-top:6px;padding-bottom:14px}
.hero-row{display:flex;gap:32px;margin:28px 0 36px;flex-wrap:wrap;align-items:baseline}
.hr-stat{display:flex;align-items:baseline;gap:4px}
.hr-val{font-family:'Bricolage Grotesque',sans-serif;font-size:36px;font-weight:700}
.hr-unit{font-size:13px}
.hr-sep{font-size:16px}

/* Ask hero (structure) */
.ask-hero{padding:32px;position:relative;overflow:hidden;margin-bottom:28px}
.ask-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ask-title{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:700;margin-bottom:4px}
.ask-sub{font-size:13px;margin-bottom:20px;line-height:1.5}
.ask-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.ask-pill{padding:8px 16px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s}
.ask-row{display:flex;gap:8px}
.ask-row input{flex:1;padding:14px 16px;font-family:'Space Mono',monospace;font-size:13px;outline:none;transition:all .2s}
.ask-row input::placeholder{opacity:.5}
.ask-row button{border:none;padding:14px 28px;font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.embed-badge{position:absolute;top:12px;right:14px;display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:10px;letter-spacing:.04em;cursor:pointer;transition:all .2s;font-family:'Space Mono',monospace}
.embed-badge svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}

/* Tabs */
.tabs{display:flex}
.tab-btn{padding:13px 28px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-panel{display:none;padding:16px 0}
.tab-panel.active{display:block}
.facts-dense{display:grid;grid-template-columns:1fr 1fr;gap:28px}
@media(max-width:640px){.facts-dense{grid-template-columns:1fr}}
.fd-group{padding-top:8px}
.grp-title{font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px}
.fr{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0}
.fr:hover{opacity:.85}
.fk{font-size:14px}
.fv{font-weight:700;text-align:right;font-size:15px}

/* Trust strip */
.trust-strip{display:flex;gap:14px;align-items:center;padding:10px 14px;flex-wrap:wrap;font-size:11px;margin-top:20px}
.badge{letter-spacing:.1em;display:flex;align-items:center;gap:5px}
.badge .dot{width:5px;height:5px;border-radius:50%}

.raw{margin-top:24px;font-size:11px}
.raw a{text-decoration:none}

<body>

<div class="var-nav">
  <span class="var-label">Colour</span>
  <button class="active" data-var="v1">Bone White</button>
  <button data-var="v2">Midnight Cyan</button>
  <button data-var="v3">Warm Amber</button>
  <button data-var="v4">Slate Emerald</button>
  <button data-var="v5">Ink Orange</button>
  <button data-var="v6">Arctic Indigo</button>
  <button data-var="v7">Forest</button>
  <button data-var="v8">Noir Red</button>
  <button data-var="v9">Paper Teal</button>
  <button data-var="v10">Charcoal Blue</button>
</div>

<script>
// Generate page HTML (shared across all variations)
function pageHTML(id) {
  return `<div class="pir-page"><div class="page">
  <div class="signal">PIR/1.0 &ensp;|&ensp; commercial fridge &ensp;|&ensp; 9351886006558</div>
  <h1>1-Door Commercial Fridge</h1>
  <div class="brand-tag">Schmick &mdash; HUS &bull; HUS-SC700W &bull; 9351886006558</div>
  <div class="hero-row">
    <div class="hr-stat"><span class="hr-val">737</span><span class="hr-unit">L</span></div>
    <span class="hr-sep">/</span>
    <div class="hr-stat"><span class="hr-val">47</span><span class="hr-unit">dB</span></div>
    <span class="hr-sep">/</span>
    <div class="hr-stat"><span class="hr-val">$150</span><span class="hr-unit">/yr</span></div>
    <span class="hr-sep">/</span>
    <div class="hr-stat"><span class="hr-val">65</span><span class="hr-unit">kg</span></div>
  </div>
  <div class="ask-hero">
    <div class="embed-badge"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Embed this</div>
    <div class="ask-title">Have a question?</div>
    <div class="ask-sub">Get instant answers from verified product data. No guessing, no hallucination.</div>
    <div class="ask-pills">
      <div class="ask-pill">What is the capacity?</div>
      <div class="ask-pill">Is it lockable?</div>
      <div class="ask-pill">How noisy is it?</div>
      <div class="ask-pill">What are the running costs?</div>
    </div>
    <div class="ask-row">
      <input type="text" placeholder="Ask anything about this product...">
      <button>Ask an Expert</button>
    </div>
  </div>
  <div class="tabs" data-scope="${id}">
    <button class="tab-btn active" data-tab="facts">Specifications (28)</button>
    <button class="tab-btn" data-tab="qa">Q&A (5)</button>
    <button class="tab-btn" data-tab="docs">Documents</button>
  </div>
  <div class="tab-panel active" data-panel="facts" data-scope="${id}">
    <div class="facts-dense">
      <div class="fd-group"><div class="grp-title">Capacity</div>
        <div class="fr"><span class="fk">Capacity Litres</span><span class="fv">737</span></div>
        <div class="fr"><span class="fk">Capacity 375ml Cans</span><span class="fv">600</span></div>
      </div>
      <div class="fd-group"><div class="grp-title">Dimensions</div>
        <div class="fr"><span class="fk">Exterior W</span><span class="fv">890 mm</span></div>
        <div class="fr"><span class="fk">Exterior D</span><span class="fv">655 mm</span></div>
        <div class="fr"><span class="fk">Exterior H</span><span class="fv">2130 mm</span></div>
        <div class="fr"><span class="fk">Weight</span><span class="fv">65 kg</span></div>
      </div>
      <div class="fd-group"><div class="grp-title">Performance</div>
        <div class="fr"><span class="fk">Noise</span><span class="fv">47 dB</span></div>
        <div class="fr"><span class="fk">Power</span><span class="fv">1.6 kWh/24h</span></div>
        <div class="fr"><span class="fk">Running Cost</span><span class="fv">$149.74 / yr</span></div>
      </div>
      <div class="fd-group"><div class="grp-title">Construction</div>
        <div class="fr"><span class="fk">Door Hinge</span><span class="fv">Right Hinged</span></div>
        <div class="fr"><span class="fk">Glass Door</span><span class="fv">Yes</span></div>
        <div class="fr"><span class="fk">Body Material</span><span class="fv">White</span></div>
        <div class="fr"><span class="fk">Interior Finish</span><span class="fv">White</span></div>
      </div>
    </div>
  </div>
  <div class="tab-panel" data-panel="qa" data-scope="${id}"></div>
  <div class="tab-panel" data-panel="docs" data-scope="${id}"></div>
  <div class="trust-strip">
    <div class="badge"><span class="dot"></span>BRAND CERTIFIED</div>
    <span style="opacity:.6">kingcave.com.au &bull; 2025-09-19</span>
  </div>
  <div class="raw">JSON: <a href="#">signetry.ai/records/9351886006558</a> &ensp;|&ensp; <a href="#">Schema</a> &ensp;|&ensp; <a href="#">CC-BY 4.0</a></div>
</div></div>`;
}

// Inject all 10 variations
for (let i = 1; i <= 10; i++) {
  const div = document.createElement('div');
  div.className = 'variation' + (i === 1 ? ' active' : '');
  div.id = 'v' + i;
  div.innerHTML = pageHTML('v' + i);
  document.body.appendChild(div);
}

// Nav
document.querySelectorAll('.var-nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.var-nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.variation').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.var).classList.add('active');
  });
});

// Scoped tabs
document.addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const scope = btn.closest('[data-scope]')?.dataset.scope;
  if (!scope) return;
  const page = btn.closest('.page');
  page.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  page.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  page.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"][data-scope="${scope}"]`)?.classList.add('active');
});
</script>

</body>
</html>
